[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    parquet_data: marks tests that validate Parquet data sources
    smoke: marks tests as lightweight smoke/sanity checks
    facility_name_min_time_spent_per_visit_date: marks tests for the facility_name_min_time_spent_per_visit_date dataset
    facility_type_avg_time_spent_per_visit_date: marks tests for the facility_type_avg_time_spent_per_visit_date dataset
    patient_sum_treatment_cost_per_facility_type: marks tests for the patient_sum_treatment_cost_per_facility_type dataset